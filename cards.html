<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guest Cards — Raufan Yusup</title>
  <meta name="description" content="A gallery of all guest cards left by visitors.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f3f0;
      color: #1a1a1a;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ---- Canvas viewport ---- */
    .canvas-viewport {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: grab;
      position: relative;
    }
    .canvas-viewport.is-dragging {
      cursor: grabbing;
    }

    .canvas-world {
      width: 4000px;
      height: 3000px;
      position: absolute;
      top: 0;
      left: 0;
      will-change: transform;
    }

    /* ---- Loading / empty states ---- */
    .canvas-status {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.6s ease;
    }
    .canvas-status.is-hidden {
      opacity: 0;
    }
    .canvas-status-text {
      font-size: 15px;
      font-weight: 500;
      color: #888;
      letter-spacing: 0.02em;
      animation: statusPulse 2s ease-in-out infinite;
    }

    @keyframes statusPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ---- Card ---- */
    .gallery-card {
      position: absolute;
      width: 280px;
      height: 160px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      opacity: 0;
      animation: cardFadeIn 0.5s ease forwards;
    }
    .gallery-card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);
      z-index: 5;
    }
    .gallery-card.is-new {
      animation: cardPopIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes cardPopIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    .gallery-card-bg {
      position: absolute;
      inset: 0;
      border-radius: 14px;
    }

    .gallery-card-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.18;
      border-radius: 14px;
      overflow: hidden;
    }
    .gallery-card-pattern svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .gallery-card-content {
      position: relative;
      z-index: 1;
      padding: 16px 18px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .gallery-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--card-ink);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gallery-card-message {
      font-size: 12px;
      font-weight: 400;
      color: var(--card-ink);
      opacity: 0.75;
      line-height: 1.5;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .gallery-card-signature {
      width: 60px;
      height: 30px;
      object-fit: contain;
      opacity: 0.8;
      margin-top: 6px;
    }

    .gallery-card-date {
      font-size: 10px;
      font-weight: 500;
      color: var(--card-ink);
      opacity: 0.45;
      text-align: right;
      margin-top: auto;
    }

    .gallery-card-footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    /* ---- Back link ---- */
    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      text-decoration: none;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.06);
      transition: background 0.15s ease;
    }
    .back-link:hover {
      background: rgba(255,255,255,1);
      color: #1a1a1a;
    }

    /* ---- Mobile ---- */
    @media (max-width: 640px) {
      .gallery-card {
        width: 240px;
        height: 140px;
        transform: scale(0.85);
      }
      .gallery-card-content {
        padding: 12px 14px;
      }
    }
  </style>
</head>
<body>
  <a href="/" class="back-link">← Back</a>

  <div class="canvas-status" id="status">
    <span class="canvas-status-text" id="statusText">Gathering cards…</span>
  </div>

  <div class="canvas-viewport" id="viewport">
    <div class="canvas-world" id="world"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // ---- Supabase ----
    const SUPABASE_URL = 'https://dbvaqcorhfqvyyvqyoql.supabase.co';
    const SUPABASE_ANON_KEY =
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRidmFxY29yaGZxdnl5dnF5b3FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTE4MjEsImV4cCI6MjA5MTQyNzgyMX0.mDAK8f41sJVrnRx-h6Tqbw1RRUrEbWUIdlLThb_pSEk';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const DEFAULT_CARD_COLOR = '#E8541A';
    const WORLD_W = 4000;
    const WORLD_H = 3000;

    const viewport = document.getElementById('viewport');
    const world = document.getElementById('world');
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');

    // ---- Seeded random from entry id ----
    function seededRandom(seed) {
      let h = 0;
      const s = String(seed);
      for (let i = 0; i < s.length; i++) {
        h = Math.imul(31, h) + s.charCodeAt(i) | 0;
      }
      return () => {
        h = Math.imul(h ^ (h >>> 15), h | 1);
        h ^= h + Math.imul(h ^ (h >>> 7), h | 61);
        return ((h ^ (h >>> 14)) >>> 0) / 4294967296;
      };
    }

    // ---- Pattern SVG generator (mirrors GuestbookCard.js) ----
    let patternUid = 0;
    function createPatternSVG(key) {
      const NS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(NS, 'svg');
      svg.setAttribute('xmlns', NS);
      svg.setAttribute('width', '100%');
      svg.setAttribute('height', '100%');
      svg.setAttribute('aria-hidden', 'true');

      const id = `gp-${key}-${++patternUid}`;
      const defs = document.createElementNS(NS, 'defs');
      const pat = document.createElementNS(NS, 'pattern');
      pat.setAttribute('id', id);
      pat.setAttribute('patternUnits', 'userSpaceOnUse');

      const addLine = (x1, y1, x2, y2, w = 1) => {
        const el = document.createElementNS(NS, 'line');
        el.setAttribute('x1', x1); el.setAttribute('y1', y1);
        el.setAttribute('x2', x2); el.setAttribute('y2', y2);
        el.setAttribute('stroke', 'currentColor');
        el.setAttribute('stroke-width', w);
        el.setAttribute('stroke-linecap', 'round');
        pat.appendChild(el);
      };

      switch (key) {
        case 'dash-scatter':
          pat.setAttribute('width', '32'); pat.setAttribute('height', '22');
          addLine(4,12,12,6,1.5); addLine(20,14,28,8,1.5);
          addLine(14,2,22,-2,1.5); addLine(-2,2,6,-2,1.5);
          break;
        case 'dot-grid': {
          pat.setAttribute('width', '24'); pat.setAttribute('height', '24');
          const c = document.createElementNS(NS, 'circle');
          c.setAttribute('cx','12'); c.setAttribute('cy','12');
          c.setAttribute('r','2'); c.setAttribute('fill','currentColor');
          pat.appendChild(c);
          break;
        }
        case 'ruled':
          pat.setAttribute('width', '20'); pat.setAttribute('height', '20');
          addLine(0,10,20,10,1);
          break;
        case 'batik-kawung': {
          pat.setAttribute('width', '20'); pat.setAttribute('height', '20');
          [[10,3,3,5],[10,17,3,5],[3,10,5,3],[17,10,5,3]].forEach(([cx,cy,rx,ry]) => {
            const e = document.createElementNS(NS, 'ellipse');
            e.setAttribute('cx',cx); e.setAttribute('cy',cy);
            e.setAttribute('rx',rx); e.setAttribute('ry',ry);
            e.setAttribute('fill','none'); e.setAttribute('stroke','currentColor');
            e.setAttribute('stroke-width','0.9');
            pat.appendChild(e);
          });
          break;
        }
        case 'batik-parang': {
          pat.setAttribute('width', '16'); pat.setAttribute('height', '16');
          pat.setAttribute('patternTransform', 'rotate(-45)');
          const p = document.createElementNS(NS, 'path');
          p.setAttribute('d', 'M8,0 C4,4 12,12 8,16');
          p.setAttribute('fill', 'none'); p.setAttribute('stroke', 'currentColor');
          p.setAttribute('stroke-width', '1.3'); p.setAttribute('stroke-linecap', 'round');
          pat.appendChild(p);
          break;
        }
        default:
          return createPatternSVG('dash-scatter');
      }

      defs.appendChild(pat); svg.appendChild(defs);
      const rect = document.createElementNS(NS, 'rect');
      rect.setAttribute('width', '100%'); rect.setAttribute('height', '100%');
      rect.setAttribute('fill', `url(#${id})`);
      svg.appendChild(rect);
      return svg;
    }

    // ---- Contrast helpers ----
    function hexToHSL(hex) {
      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      const l = (max+min)/2;
      return l;
    }
    function getInkColor(bg) {
      return hexToHSL(bg || DEFAULT_CARD_COLOR) > 0.65 ? '#1a1a1a' : '#ffffff';
    }

    // ---- Build a card DOM element ----
    function buildCard(entry, isNew = false) {
      const color = entry.card_color || DEFAULT_CARD_COLOR;
      const ink = getInkColor(color);
      const rng = seededRandom(entry.id);

      // Position within world, with padding from edges
      const pad = 200;
      const x = pad + rng() * (WORLD_W - 2 * pad - 280);
      const y = pad + rng() * (WORLD_H - 2 * pad - 160);
      const rotation = (rng() - 0.5) * 12; // -6 to +6 degrees

      const card = document.createElement('div');
      card.className = 'gallery-card' + (isNew ? ' is-new' : '');
      card.style.left = `${x}px`;
      card.style.top = `${y}px`;
      card.style.transform = `rotate(${rotation}deg)`;
      card.style.setProperty('--card-ink', ink);
      card.style.animationDelay = isNew ? '0s' : `${rng() * 0.4}s`;

      // Background
      const bg = document.createElement('div');
      bg.className = 'gallery-card-bg';
      bg.style.background = color;
      card.appendChild(bg);

      // Pattern
      if (entry.pattern) {
        const patWrap = document.createElement('div');
        patWrap.className = 'gallery-card-pattern';
        patWrap.style.color = ink;
        patWrap.appendChild(createPatternSVG(entry.pattern));
        card.appendChild(patWrap);
      }

      // Content
      const content = document.createElement('div');
      content.className = 'gallery-card-content';

      const name = document.createElement('div');
      name.className = 'gallery-card-name';
      name.textContent = entry.name || 'Anonymous';
      content.appendChild(name);

      if (entry.message) {
        const msg = document.createElement('div');
        msg.className = 'gallery-card-message';
        msg.textContent = entry.message;
        content.appendChild(msg);
      }

      const footer = document.createElement('div');
      footer.className = 'gallery-card-footer';

      if (entry.signature_data) {
        const sig = document.createElement('img');
        sig.className = 'gallery-card-signature';
        sig.src = entry.signature_data;
        sig.alt = '';
        sig.draggable = false;
        footer.appendChild(sig);
      } else {
        footer.appendChild(document.createElement('span'));
      }

      const date = document.createElement('div');
      date.className = 'gallery-card-date';
      const d = new Date(entry.created_at);
      date.textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      footer.appendChild(date);

      content.appendChild(footer);
      card.appendChild(content);

      return card;
    }

    // ---- Pan / drag with inertia ----
    let panX = 0, panY = 0;
    let isDragging = false;
    let startX, startY, startPanX, startPanY;
    let velX = 0, velY = 0;
    let lastMoveX = 0, lastMoveY = 0, lastMoveTime = 0;
    let inertiaRaf = null;

    function applyTransform() {
      world.style.transform = `translate(${panX}px, ${panY}px)`;
    }

    function centerCanvas() {
      const vw = viewport.clientWidth;
      const vh = viewport.clientHeight;
      panX = -(WORLD_W - vw) / 2;
      panY = -(WORLD_H - vh) / 2;
      applyTransform();
    }

    function clampPan() {
      const vw = viewport.clientWidth;
      const vh = viewport.clientHeight;
      const minX = -(WORLD_W - vw);
      const minY = -(WORLD_H - vh);
      panX = Math.max(minX, Math.min(0, panX));
      panY = Math.max(minY, Math.min(0, panY));
    }

    function onPointerDown(e) {
      if (e.button !== 0) return;
      isDragging = true;
      viewport.classList.add('is-dragging');
      startX = e.clientX; startY = e.clientY;
      startPanX = panX; startPanY = panY;
      velX = 0; velY = 0;
      lastMoveX = e.clientX; lastMoveY = e.clientY;
      lastMoveTime = performance.now();
      if (inertiaRaf) { cancelAnimationFrame(inertiaRaf); inertiaRaf = null; }
      viewport.setPointerCapture(e.pointerId);
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      panX = startPanX + dx;
      panY = startPanY + dy;
      clampPan();
      applyTransform();

      const now = performance.now();
      const dt = now - lastMoveTime;
      if (dt > 0) {
        velX = (e.clientX - lastMoveX) / dt * 16;
        velY = (e.clientY - lastMoveY) / dt * 16;
      }
      lastMoveX = e.clientX; lastMoveY = e.clientY;
      lastMoveTime = now;
    }

    function onPointerUp() {
      if (!isDragging) return;
      isDragging = false;
      viewport.classList.remove('is-dragging');
      startInertia();
    }

    function startInertia() {
      const friction = 0.94;
      const minVel = 0.3;

      function tick() {
        velX *= friction;
        velY *= friction;
        if (Math.abs(velX) < minVel && Math.abs(velY) < minVel) {
          inertiaRaf = null;
          return;
        }
        panX += velX;
        panY += velY;
        clampPan();
        applyTransform();
        inertiaRaf = requestAnimationFrame(tick);
      }
      inertiaRaf = requestAnimationFrame(tick);
    }

    viewport.addEventListener('pointerdown', onPointerDown);
    viewport.addEventListener('pointermove', onPointerMove);
    viewport.addEventListener('pointerup', onPointerUp);
    viewport.addEventListener('pointercancel', onPointerUp);

    // Prevent text selection during drag
    viewport.addEventListener('dragstart', e => e.preventDefault());

    // ---- Touch: prevent browser scroll ----
    viewport.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

    // ---- Dummy cards for preview ----
    const DUMMY_ENTRIES = [
      { id: 101, name: 'Sarah Chen', message: 'Love the portfolio! The animations are so smooth.', card_color: '#4A90D9', pattern: 'dot-grid', created_at: '2026-04-10T14:30:00Z', signature_data: null },
      { id: 102, name: 'Marcus', message: 'Great work on the guestbook concept. Really creative!', card_color: '#E8541A', pattern: 'dash-scatter', created_at: '2026-04-11T09:15:00Z', signature_data: null },
      { id: 103, name: 'Yuki Tanaka', message: '素敵なデザイン! Beautiful design work.', card_color: '#2ECC71', pattern: 'batik-kawung', created_at: '2026-04-11T18:45:00Z', signature_data: null },
      { id: 104, name: 'Alex Rivera', message: null, card_color: '#9B59B6', pattern: 'batik-parang', created_at: '2026-04-12T07:20:00Z', signature_data: null },
      { id: 105, name: 'Emma Watson', message: 'Stopped by to say hi! Your work inspires me to build more creative UI.', card_color: '#F39C12', pattern: 'ruled', created_at: '2026-04-12T12:00:00Z', signature_data: null },
      { id: 106, name: 'Dev', message: 'The infinite canvas idea is genius.', card_color: '#1ABC9C', pattern: 'dot-grid', created_at: '2026-04-12T22:10:00Z', signature_data: null },
      { id: 107, name: 'Priya Sharma', message: 'Found your portfolio through Twitter. Keep it up!', card_color: '#E74C3C', pattern: 'dash-scatter', created_at: '2026-04-13T03:30:00Z', signature_data: null },
      { id: 108, name: 'Anonymous', message: null, card_color: '#34495E', pattern: 'batik-kawung', created_at: '2026-04-13T08:00:00Z', signature_data: null },
      { id: 109, name: 'Liam O\'Brien', message: 'Really dig the batik patterns. Nice cultural touch!', card_color: '#8E44AD', pattern: 'batik-parang', created_at: '2026-04-13T10:15:00Z', signature_data: null },
      { id: 110, name: 'Zara', message: 'Minimalist and playful at the same time. 👏', card_color: '#F1C40F', pattern: 'ruled', created_at: '2026-04-13T11:00:00Z', signature_data: null },
    ];

    // ---- Load entries ----
    async function loadEntries() {
      let entries = [];

      try {
        const { data, error } = await supabase
          .from('guestbook_entries')
          .select('*')
          .order('created_at', { ascending: false });

        if (!error && data && data.length > 0) {
          entries = data;
        }
      } catch (err) {
        console.error('[Gallery] fetch failed:', err);
      }

      // Fall back to dummy entries if Supabase returned nothing
      if (entries.length === 0) {
        console.info('[Gallery] Using dummy entries for preview');
        entries = DUMMY_ENTRIES;
      }

      // Hide loading status
      status.classList.add('is-hidden');

      // Render cards with staggered fade-in
      entries.forEach(entry => {
        world.appendChild(buildCard(entry));
      });
    }

    // ---- Real-time subscription ----
    function subscribeToNew() {
      supabase
        .channel('guestbook_gallery')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'guestbook_entries' }, payload => {
          const card = buildCard(payload.new, true);
          world.appendChild(card);
        })
        .subscribe();
    }

    // ---- Init ----
    centerCanvas();
    loadEntries();
    subscribeToNew();

    // Re-center on resize
    window.addEventListener('resize', () => {
      clampPan();
      applyTransform();
    });
  </script>
</body>
</html>
